<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI八字数据分析 - MVP演示</title>
  <link rel="stylesheet" href="static/css/index.css">
</head>

<body>

  <div class="card">
    <h2>🔮 八字数据输入系统</h2>
    <p>请输入出生时间，生成五行能量报告图</p>
    <p class="instruction">年月日均为公历（阳历），请勿使用阴历。</p>
    <p class="instruction">时间为北京时间。</p>
    <p class="instruction">出生时间不确定请联系我校准</p>

    <input type="text" id="name" placeholder="姓名（亦可仅填姓或昵称）">
    <input type="radio" class="gender" id="male" name="gender" value="male">
    <label for="male">男</label>
    <input type="radio" class="gender" id="female" name="gender" value="female">
    <label for="female">女</label>

    <input type="number" id="year" placeholder="公历年 (4位数，如：2001)">
    <input type="number" id="month" placeholder="公历月（1位或2位数，如：2，08，11）">
    <input type="number" id="day" placeholder="公历日（1位或2位数，如：3，05，30）">
    <input type="number" id="hour" placeholder="时 (0-23)">
    <input type="number" id="minute" placeholder="分（0~59）">

    <button onclick="analyze()">开始数据计算</button>
    <button onclick="location.reload()" id="clear-btn">清空</button>
  </div>

  <div id="result" class="card">
    <h3>📊 分析报告</h3>
    <p><strong>八字排盘：</strong> <span id="bazi-text"></span></p>
    <p><strong>日主核心：</strong> <span id="day-master"></span></p>

    <div style="text-align: center;">
      <img id="chart-img" src="" alt="五行能量图">
    </div>

    <p style="color: #666; font-size: 12px; text-align: center; margin-top: 10px;">
      *该报告由 Python 算法自动生成
    </p>
  </div>

  <script src="static/js/index.js"></script>

</body>

</html>
